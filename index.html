<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Demo POC - Static Website Hosting on AWS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        header {
            padding: 60px 20px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
            margin: 10px 0;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 16px;
            background-color: #ff9800;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            color: white;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background-color: #e68900;
        }

        footer {
            margin-top: 120px;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to POC-23</h1>
    <p>POC-23 Static Website hosted on S3 using AWS services code pipeline,cloudfront......</p>
    <button class="btn" onclick="showMessage()">Click Me</button>
</header>

<footer>
    <p>Deployed via AWS CodePipeline | DevOps Demo static website in s3 bucket</p>
</footer>

<script>
    function showMessage() {
        alert("Deployment Successful!");
    }
</script>

</body>
</html>
